# fly.toml file for Veryresto Community Identity Portal

app = "community-veryresto"
primary_region = "sin" # Singapore (closest region to UTC+7)

[build]
  # Uses the local Dockerfile we created
  dockerfile = "Dockerfile"
  [build.args]
    VITE_SUPABASE_URL = "https://lfxkabhzfgenpqfnhjyw.supabase.co"
    VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_jtADEBQ9FAYPaSqU5iabtg_m356QDIw"

[http_service]
