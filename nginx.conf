server {
    listen 80;
    server_name localhost;

    # Redirect legacy domain to the new portal domain
    if ($host = "community.veryresto.com") {
        return 301 https://portal.veryresto.com$request_uri;
    }

    location = /api/auth/predefined-login {
        proxy_pass https://lfxkabhzfgenpqfnhjyw.supabase.co/functions/v1/predefined-login;
        proxy_set_header Host lfxkabhzfgenpqfnhjyw.supabase.co;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Cache control for static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|otf|json)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
